<style>

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Impact', monospace;
  background: #0b0f14;
  color: #00ffc8;
  perspective: 1px;
  height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Parallax */
.parallax-section {
  position: relative;
  height: 100vh;
  transform-style: preserve-3d;
}

.layer-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, , #000);
  transform: translateZ(-1px) scale(2);
}

.layer-grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,255,200,0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,200,0.15) 1px, transparent 1px);
  background-size: 50px 50px;
  transform: translateZ(-0.5px) scale(1.5);
}

/* ========================= */
/* NEURAL PARTICLES */
/* ========================= */

.neural-network {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #00ffc8;
  border-radius: 50%;
  box-shadow: 0 0 10px #00ffc8;
  animation: float 10s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  from {
    transform: translateY(100vh) translateX(0);
  }
  to {
    transform: translateY(-10vh) translateX(50px);
  }
}

/* ========================= */
/* BIOMETRIC PANEL */
/* ========================= */

.biometric-panel {
  position: absolute;
  width: 100%;
  bottom: 40px;
  font-family: 'Impact', monospace;
  font-size: 16px;
  color: #00ffc8;
  background: rgba(0, 0, 0, 0);
  padding: 20px;
  backdrop-filter: blur(8px);
  
}

.value {
  color: #00ffc8;
  animation: pulse 4s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Alpha wave mini graph */

.alpha-wave {
  width: 100%;
  height: 40px;
  position: relative;
  overflow: hidden;
  margin-top: 10px;
}

.alpha-wave::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 10px,
    #00ffc8 12px,
    transparent 14px
  );
  animation: alphaMove 1.5s linear infinite;
}

@keyframes alphaMove {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* Contenido */
.content {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* ========================= */
/* HEADING BIOMÉTRICO */
/* ========================= */

h1 {
  position: relative;
  font-size: 120px;
  letter-spacing: 4px;
  color: #0b0f14;
  text-shadow:
    0 0 10px #00ffc8,
    0 0 20px #00ffc8,
    0 0 40px #00ffc8;
  animation: glitch 2s infinite;
}

/* GLITCH EFFECT */

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

p {
  margin-top: 1.5rem;
  max-width: 600px;
  color: #0b0f14;
  font-size: 20px;
  letter-spacing: 1px;
text-shadow:
    0 0 10px #00ffc8,
    0 0 20px #00ffc8,
    0 0 10px #00ffc8;
  animation: glitch 6s infinite;
}

.section {
  height: 100vh;
  font-size: 20px;
  background: #0b0f14;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ========================= */
/* CRT SCANLINES EFFECT */
/* ========================= */

.crt-overlay {
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: 
    repeating-linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.3) 0px,
      rgba(0, 0, 0, 0.3) 1px,
      transparent 2px,
      transparent 4px
    );
  mix-blend-mode: overlay;
  animation: flicker 0.20s infinite;
}

/* Flicker analógico */

@keyframes flicker {
  0% { opacity: 0.50; }
  50% { opacity: 0.8; }
  100% { opacity: 0.92; }
}

/* Curvatura ligera de pantalla */

body::after {
  content: "";
  pointer-events: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    transparent 40%,
    rgba(0,0,0,0.4) 100%
  );
  z-index: 998;
}

</style>
</head>

<section class="parallax-section">
<div class="neural-network">
  <div class="particle" style="left:10%; animation-duration:12s;"></div>
  <div class="particle" style="left:25%; animation-duration:8s;"></div>
  <div class="particle" style="left:40%; animation-duration:15s;"></div>
  <div class="particle" style="left:60%; animation-duration:10s;"></div>
  <div class="particle" style="left:75%; animation-duration:13s;"></div>
  <div class="particle" style="left:85%; animation-duration:9s;"></div>
  <div class="particle" style="right:10%; animation-duration:12s;"></div>
  <div class="particle" style="right:25%; animation-duration:8s;"></div>
  <div class="particle" style="right:40%; animation-duration:15s;"></div>
  <div class="particle" style="right:60%; animation-duration:10s;"></div>
  <div class="particle" style="right:75%; animation-duration:13s;"></div>
  <div class="particle" style="right:85%; animation-duration:9s;"></div>

</div>
  <div class="layer-bg"></div>
  <div class="layer-grid"></div>

  <div class="content">

   <h1 data-text="BIOVAL LAB">BIOVAL LAB</h1>
<div class="eeg"></div>

</section>
